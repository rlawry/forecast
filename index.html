<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>NWS forecast station model</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #fff;
      font-family: Arial, sans-serif;
    }

    .wrap {
      width: 460px;
      text-align: center;
      padding: 16px 16px 24px;
      box-sizing: border-box;
    }

    .searchRow {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-bottom: 8px;
      align-items: start;
    }

    .searchWrap {
      position: relative;
    }

    #addressInput {
      width: 100%;
      box-sizing: border-box;
      min-height: 42px;
      padding: 8px 10px;
      font: 14px Arial, sans-serif;
    }

    .searchRow button,
    .controls button {
      padding: 8px 12px;
      font: 14px Arial, sans-serif;
      cursor: pointer;
      min-height: 40px;
    }

    #suggestions {
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
      background: #fff;
      border: 1px solid #bbb;
      border-top: none;
      z-index: 20;
      text-align: left;
      display: none;
      max-height: 220px;
      overflow-y: auto;
    }

    .suggestion {
      padding: 8px 10px;
      font: 14px Arial, sans-serif;
      cursor: pointer;
      border-top: 1px solid #eee;
      background: #fff;
    }

    .suggestion:first-child {
      border-top: none;
    }

    .suggestion:hover {
      background: #f2f2f2;
    }

    #searchStatus {
      min-height: 18px;
      font-size: 12px;
      margin-bottom: 6px;
    }

    #locationName {
      font: 18px Arial, sans-serif;
      margin-bottom: 8px;
    }

    #loading {
      min-height: 44px;
      margin-bottom: 10px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font: 15px Arial, sans-serif;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid #d7d7d7;
      border-top-color: #444;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      flex: 0 0 auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .stationWrap {
      min-height: 286px;
    }

    #station {
      width: 320px;
      height: 260px;
      display: block;
      margin: 0 auto;
      background: #fff;
    }

    #stationMeta {
      min-height: 20px;
      margin-top: 4px;
      font: 13px Arial, sans-serif;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin: 8px 52px 0;
    }

    .controls button.active {
      outline: 2px solid #6a2ca0;
      outline-offset: -2px;
    }

    input[type="range"] {
      width: 100%;
      margin-top: 10px;
    }

    .labels {
      display: grid;
      grid-template-columns: 1fr 1.35fr 1fr;
      gap: 8px;
      margin-top: 6px;
      font-size: 12px;
    }

    .labels span {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-variant-numeric: tabular-nums;
    }

    .labels span:nth-child(1) {
      justify-content: flex-start;
      text-align: left;
    }

    .labels span:nth-child(3) {
      justify-content: flex-end;
      text-align: right;
    }

    #sourceRow {
      margin-top: 8px;
      font-size: 12px;
      min-height: 18px;
    }

    #sourceRow a {
      color: #1155cc;
      text-decoration: none;
    }

    #sourceRow a:hover {
      text-decoration: underline;
    }

    #pressureWrap {
      margin-top: 14px;
      text-align: left;
    }

    #pressureWrap h3 {
      font-size: 14px;
      margin: 0 0 6px;
      visibility: hidden;
    }

    #pressureTable {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      visibility: hidden;
    }

    #pressureTable th,
    #pressureTable td {
      border: 1px solid #bbb;
      padding: 6px 8px;
      vertical-align: top;
    }

    #pressureTable th {
      background: #efefef;
    }

    #pressureTable td:nth-child(1) {
      white-space: nowrap;
    }


    .sliderRow {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }

    .sliderRow input[type="range"] {
      margin-top: 0;
    }

    #chartWrap {
      position: relative;
      margin-top: 12px;
      margin-bottom: 14px;
      min-height: 230px;
      border: 1px solid #cfcfcf;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #chartCanvas {
      width: 100%;
      height: 230px;
      display: none;
    }

    #chartOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      text-align: center;
      font: 16px Arial, sans-serif;
      color: #555;
      pointer-events: none;
      background: rgba(255,255,255,0.9);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="searchRow">
      <div class="searchWrap">
        <input id="addressInput" type="text" placeholder="Search address" autocomplete="off">

      </div>

    <div class="controls">

      <button id="backBtn" type="button">&lt;</button>

    <div id="chartWrap">

      <div id="chartOverlay">Select Weather Variables to See Plot</div>
    </div>

    <div id="sourceRow">Source: <a id="sourceLink" href="#" target="_blank" rel="noopener noreferrer">NOAA/NWS</a></div>

  </div>

    });

    function fmt(t) {
      return new Date(+t).toLocaleString([], { month: "short", day: "numeric", hour: "numeric" });
    }
    function fmtLong(t) {
      return new Date(+t).toLocaleString([], {
        year: "numeric", month: "short", day: "numeric", hour: "numeric", minute: "2-digit"
      });
    }
    function isoNoMillis(t) {
      return new Date(t).toISOString().replace(/\.\d{3}Z$/, "Z");
    }
    function floorHour(t) {
      const d = new Date(t);
      d.setMinutes(0, 0, 0);
      return d.getTime();
    }
    function cToF(c) {
      return c == null ? null : Math.round(c * 9 / 5 + 32);
    }
    function mpsToKt(v) {
      return v == null ? null : Math.round(v * 1.94384449);
    }
    function mToMiles(v) {
      return v == null ? null : v / 1609.344;
    }
    function paToHpa(v) {
      return v == null ? null : v / 100;
    }
    function qvValue(obj) {
      return typeof obj?.value === "number" && Number.isFinite(obj.value) ? obj.value : null;
    }
    function parseDurationMs(d) {
      const m = String(d || "").match(/^P(?:(\d+)D)?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?)?$/);
      if (!m) return 0;
      return ((+m[1] || 0) * 86400 + (+m[2] || 0) * 3600 + (+m[3] || 0) * 60 + (+m[4] || 0)) * 1000;
    }
    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }
    function normalizeText(...parts) {
      return parts.filter(Boolean).join(" ").toLowerCase().replace(/[_/]+/g, " ").replace(/\s+/g, " ").trim();
    }
    function pressureCodeFromHpa(hPa) {
      if (hPa == null || !isFinite(hPa)) return "///";
      return String(Math.round(hPa * 10)).slice(-3).padStart(3, "0");
    }
    function forecastSourceUrl(loc) {
      return `https://forecast.weather.gov/MapClick.php?lat=${loc.lat}&lon=${loc.lon}&unit=0&lg=english&FcstType=graphical`;
    }
    function setForecastSource(loc) {
      sourceLink.href = forecastSourceUrl(loc);
    }
    function setLocationTitle(name) {
      locationName.textContent = name || "";
    }
    function setLoading(msg, show = true) {
      loadingText.textContent = msg || "Loading";
      loading.style.display = show ? "flex" : "none";
    }
    function saveLocation(loc) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(loc)); } catch (e) { }
    }
    function getSavedLocation() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch (e) { return null; }
    }
    function clearSuggestions() {
      suggestions.innerHTML = "";
      suggestions.style.display = "none";
    }
    function showSuggestions(items) {
      suggestions.innerHTML = "";
      if (!items.length) {
        clearSuggestions();
        return;
      }
      for (const item of items) {
        const div = document.createElement("div");
        div.className = "suggestion";
        div.textContent = item.display_name;
        div.addEventListener("mousedown", () => {
          pendingLocation = {
            name: item.display_name,
            lat: parseFloat(item.lat),
            lon: parseFloat(item.lon)
          };
          addressInput.value = pendingLocation.name;
          searchStatus.textContent = `Selected: ${pendingLocation.name}`;
          clearSuggestions();
        });
        suggestions.appendChild(div);
      }
      suggestions.style.display = "block";
    }
    async function searchAddresses(q) {
      if (searchAbort) searchAbort.abort();
      searchAbort = new AbortController();
      const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&limit=5&countrycodes=us&q=${encodeURIComponent(q)}`;
      try {
        const data = await fetch(url, {
          signal: searchAbort.signal,
          headers: { Accept: "application/json" }
        }).then(r => r.json());
        showSuggestions(Array.isArray(data) ? data : []);
      } catch (e) {
        if (e.name !== "AbortError") clearSuggestions();
      }
    }
    async function fetchJson(url) {
      const r = await fetch(url, { headers: APP_HEADERS });
      if (!r.ok) throw new Error(`${r.status} ${url}`);
      return r.json();
    }
    async function fetchOpenMeteoHourly(loc, pastHours, forecastHours) {
      const params = new URLSearchParams({
        latitude: String(loc.lat),
        longitude: String(loc.lon),
        hourly: 'pressure_msl,wind_speed_10m,wind_direction_10m',
        timezone: 'America/New_York',
        timeformat: 'unixtime',
        past_hours: String(Math.max(0, Math.round(pastHours))),
        forecast_hours: String(Math.max(1, Math.round(forecastHours)))
      });
      const url = `https://api.open-meteo.com/v1/forecast?${params.toString()}`;
      const data = await fetch(url).then(async r => {
        if (!r.ok) throw new Error(`${r.status} ${url}`);
        return r.json();
      });
      const h = data?.hourly;
      const times = Array.isArray(h?.time) ? h.time : [];
      const pressures = Array.isArray(h?.pressure_msl) ? h.pressure_msl : [];
      const windSpeeds = Array.isArray(h?.wind_speed_10m) ? h.wind_speed_10m : [];
      const windDirs = Array.isArray(h?.wind_direction_10m) ? h.wind_direction_10m : [];
      const map = new Map();
      for (let i = 0; i < times.length; i++) {
        const hour = Number(times[i]) * 1000;
        if (!Number.isFinite(hour)) continue;
        const pressure = Number(pressures[i]);
        const speedKmh = Number(windSpeeds[i]);
        const direction = Number(windDirs[i]);
        map.set(floorHour(hour), {
          pressureHpa: Number.isFinite(pressure) ? pressure : null,
          windKt: Number.isFinite(speedKmh) ? Math.round(speedKmh * 0.539957) : null,
          windDirection: Number.isFinite(direction) ? ((direction % 360) + 360) % 360 : null
        });
      }
      return map;
    }
    function chooseNearestStation(stationsFc, loc) {
      const feats = Array.isArray(stationsFc?.features) ? stationsFc.features : [];
      let best = null;
      let bestKm = Infinity;
      for (const f of feats) {
        const coords = f?.geometry?.coordinates;
        if (!Array.isArray(coords) || coords.length < 2) continue;
        const km = haversineKm(loc.lat, loc.lon, coords[1], coords[0]);
        if (km < bestKm) {
          bestKm = km;
          best = f;
        }
      }
      return best;
    }
    function observationWeatherText(rec) {
      const parts = [];
      for (const item of rec?.presentWeather || []) {
        if (item?.rawString) parts.push(item.rawString);
        if (item?.weather) parts.push(item.weather);
        if (item?.modifier) parts.push(item.modifier);
        if (item?.intensity) parts.push(item.intensity);
        if (item?.phenomenon) parts.push(item.phenomenon);
      }
      if (rec?.textDescription) parts.push(rec.textDescription);
      if (rec?.rawMessage) parts.push(rec.rawMessage);
      return normalizeText(...parts);
    }
    function observationCloudTypeText(rec) {
      const raw = normalizeText(rec?.textDescription, rec?.rawMessage);
      return raw;
    }
    function inferReportType(raw) {
      const s = String(raw || "").trim().toUpperCase();
      if (s.startsWith("SPECI")) return "SPECI";
      if (s.startsWith("METAR")) return "METAR";
      return "";
    }
    function obsFeatureToRecord(feature) {
      const p = feature?.properties || {};
      const timestamp = Date.parse(p.timestamp);
      if (!Number.isFinite(timestamp)) return null;
      return {
        timestamp,
        textDescription: p.textDescription || "",
        presentWeather: p.presentWeather || [],
        cloudLayers: p.cloudLayers || [],

        temp: { type: "linear", position: "left", display: selectedAxes.has("temp"), title: { display: true, text: "Temperature (°F)" } },
        pressure: { type: "linear", position: "right", display: selectedAxes.has("pressure"), title: { display: true, text: "Pressure (hPa)" }, grid: { drawOnChartArea: false } },
        wind: { type: "linear", position: "right", offset: true, display: selectedAxes.has("wind"), title: { display: true, text: "Wind (kt)" }, grid: { drawOnChartArea: false } },
        windDir: { type: "linear", position: "right", offset: true, min: 0, max: 360, display: selectedAxes.has("windDir"), title: { display: true, text: "Wind Direction (°)" }, grid: { drawOnChartArea: false } },
        visibility: { type: "linear", position: "right", offset: true, beginAtZero: true, display: selectedAxes.has("visibility"), title: { display: true, text: "Visibility (mi)" }, grid: { drawOnChartArea: false } },
        precip: { type: "linear", position: "right", offset: true, beginAtZero: true, display: selectedAxes.has("precip"), title: { display: true, text: "3 hr Precip (in)" }, grid: { drawOnChartArea: false } },
        sky: { type: "linear", position: "right", offset: true, min: 0, max: 100, display: selectedAxes.has("sky"), title: { display: true, text: "Sky Cover (%)" }, grid: { drawOnChartArea: false } }
      };
    }
    function seedSelectedVariableAtIndex(key, index) {
      if (!timeline.length) return;
      const safeIndex = Math.max(0, Math.min(timeline.length - 1, Number(index) || 0));
      const visited = new Array(timeline.length).fill(false);
      visited[safeIndex] = true;
      plotVisitedByVar[key] = visited;
    }
    function markVisitedRange(startIndex, endIndex) {
      if (!timeline.length || !selectedPlotVars.length) return;
      const start = Math.max(0, Math.min(timeline.length - 1, Number(startIndex) || 0));
      const end = Math.max(0, Math.min(timeline.length - 1, Number(endIndex) || 0));
      const lo = Math.min(start, end);
      const hi = Math.max(start, end);
      for (const key of selectedPlotVars) {
        if (!plotVisitedByVar[key] || plotVisitedByVar[key].length !== timeline.length) {
          plotVisitedByVar[key] = new Array(timeline.length).fill(false);
        }
        for (let i = lo; i <= hi; i++) plotVisitedByVar[key][i] = true;
      }
    }
    function buildTraceDataset(key) {
      const meta = PLOT_VARIABLES[key];
      const visited = plotVisitedByVar[key] || [];
      return {
        label: meta.label,
        data: timeline.map((entry, i) => visited[i] ? valueAtHour(entry.time, key) : null),
        borderColor: meta.color,
        backgroundColor: meta.color,
        yAxisID: meta.axis,
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 0,
        tension: 0.2,
        spanGaps: false
      };
    }
    function buildMarkerDataset(key, currentIndex) {
      const meta = PLOT_VARIABLES[key];
      const safeIndex = Math.max(0, Math.min(timeline.length - 1, Number(currentIndex) || 0));
      const markerData = new Array(timeline.length).fill(null);
      markerData[safeIndex] = valueAtHour(timeline[safeIndex].time, key);
      return {
        label: `${meta.label} Current`,
        data: markerData,
        borderColor: meta.color,
        backgroundColor: meta.color,
        yAxisID: meta.axis,
        showLine: false,
        pointRadius: 5,
        pointHoverRadius: 6,
        pointBorderWidth: 1
      };
    }
    function rebuildChart() {
      if (weatherChart) {
        weatherChart.destroy();
        weatherChart = null;
      }
      if (!selectedPlotVars.length) {
        chartCanvas.style.display = "none";
        chartOverlay.style.display = "flex";
        return;
      }
      chartCanvas.style.display = "block";
      chartOverlay.style.display = "none";
      weatherChart = new Chart(chartCanvas.getContext("2d"), {
        type: "line",
        data: { labels: [], datasets: [] },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: {
              display: true,
              labels: {
                filter: function(item) {
                  return !String(item.text || "").endsWith(" Current");
                }
              }
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  const baseLabel = String(context.dataset.label || "").replace(/ Current$/, "");
                  const unit = Object.values(PLOT_VARIABLES).find(v => v.label === baseLabel)?.unit || "";
                  const val = context.parsed.y;
                  const digits = unit === "hPa" ? 1 : unit === "in" ? 2 : 0;
                  return `${baseLabel}: ${val == null ? "--" : Number(val).toFixed(digits)} ${unit}`.trim();
                }
              }
            }
          },
          scales: Object.assign({
            x: { ticks: { maxTicksLimit: 8, maxRotation: 0 }, title: { display: true, text: "Time" } }
          }, axisOptionsForSelection())
        }
      });
      updateChart(Number(slider.value || 0));
    }
    function updateChart(currentIndex) {
      if (!weatherChart || !selectedPlotVars.length || !timeline.length) return;
      const safeIndex = Math.max(0, Math.min(timeline.length - 1, Number(currentIndex) || 0));
      weatherChart.data.labels = timeline.map(entry => new Date(entry.time).toLocaleString([], { month: "short", day: "numeric", hour: "numeric" }));
      const datasets = [];
      for (const key of selectedPlotVars) {
        datasets.push(buildTraceDataset(key));
        datasets.push(buildMarkerDataset(key, safeIndex));
      }
      weatherChart.data.datasets = datasets;
      weatherChart.options.scales = Object.assign({
        x: { ticks: { maxTicksLimit: 8, maxRotation: 0 }, title: { display: true, text: "Time" } }
      }, axisOptionsForSelection());
      weatherChart.update();
    }
    function togglePlotVariable(key) {
      const idx = selectedPlotVars.indexOf(key);
      const currentIndex = Math.max(0, Math.min(timeline.length - 1, Number(slider.value || 0)));
      if (idx >= 0) {
        selectedPlotVars.splice(idx, 1);
        delete plotVisitedByVar[key];
      } else {
        selectedPlotVars.push(key);
        seedSelectedVariableAtIndex(key, currentIndex);
      }
      rebuildChart();
      renderByIndex(currentIndex);
    }
    function regionHit(x, y) {
      for (const [key, r] of Object.entries(CLICK_REGIONS)) {
        if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) return key;
      }
      return null;
    }
    function drawSelectionRect(key) {
      const r = CLICK_REGIONS[key];
      const color = PLOT_VARIABLES[key]?.color;
      if (!r || !color) return;
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.strokeRect(r.x, r.y, r.w, r.h);
      ctx.restore();
    }

    function renderByIndex(index) {
      if (!timeline.length) return;
      const i = Math.max(0, Math.min(timeline.length - 1, Number(index) || 0));
      slider.value = i;
      renderHour(timeline[i].time);
      if (lastChartSliderIndex == null) lastChartSliderIndex = i;
      markVisitedRange(lastChartSliderIndex, i);
      updateChart(i);
      lastChartSliderIndex = i;
    }
    function renderHour(hour) {
      const obsRec = observationAt(hour);
      const period = forecastPeriodAt(hour);
      const useObs = !!obsRec && hour <= floorHour(Date.now());

      const temp = useObs ? obsRec.temperatureF : (period?.temperature ?? cToF(gridValue(layer("temperature"), hour)));
      const rh = useObs ? obsRec.relativeHumidity : (period?.relativeHumidity?.value ?? gridValue(layer("relativeHumidity"), hour));
      const dpC = useObs ? null : (period?.dewpoint?.value ?? gridValue(layer("dewpoint"), hour));
      const dewpoint = useObs ? obsRec.dewpointF : (dpC != null ? cToF(dpC) : dewpointFromTRH(temp, rh));
      const windKt = windSpeedKtAt(hour);
      const windDir = windDirectionDegAt(hour) ?? 0;
      const visibility = useObs
        ? (obsRec.visibilityMi == null ? "" : obsRec.visibilityMi.toFixed(1).replace(/\.0$/, ""))
        : (() => {
          const visM = gridValue(layer("visibility"), hour);
          return visM == null ? "" : (visM / 1609.344).toFixed(1).replace(/\.0$/, "");
        })();
      const pressureHpa = pressureHpaAt(hour);
      const pressureCode = pressureCodeFromHpa(pressureHpa);
      const trend = pressureTrendAt(hour);
      const precip = useObs ? "" : precipInches3h(hour);
      const skyPct = skyCoverPct(period, hour, obsRec);

      const weatherText = useObs ? obsRec.weatherText : normalizeText(period?.shortForecast || "");
      const cloudTypeText = useObs ? obsRec.cloudTypeText : normalizeText(period?.detailedForecast || period?.shortForecast || "");
      const weatherSprite = chooseWeatherSpriteFromText(weatherText);
      const cloudSprite = chooseCloudSpriteFromText(cloudTypeText);

      selectedLabel.textContent = `${fmt(hour)}${useObs ? " • Observed" : " • Forecast"}`;

      ctx.clearRect(0, 0, stationCanvas.width, stationCanvas.height);

      drawText(temp ?? "", 60, 85, 24, "left");
      drawText(dewpoint ?? "", 60, 210, 24, "left");
      drawText(visibility, 28, 145, 20, "right");
      drawText(pressureCode, 238, 85, 24, "left");
      drawTrendSymbol(205, 140, trend.trend);
      drawText(trend.num, 234, 145, 18, "left");
      drawText(precip, 220, 210, 18, "left");

      drawWindBarb(160, 130, 18, windDir, windKt);
      drawSkyCover(160, 130, 18, skyPct);
      if (windKt == null || windKt < 3) drawCalmRing(160, 130, 18);

      drawSprite(ctx, "presentWeather", weatherSprite, 108, 128, 1.1);
      drawSprite(ctx, "cloudType", cloudSprite, 160, 178, 1.0);
      selectedPlotVars.forEach(drawSelectionRect);

      stationMeta.textContent = stationInfo?.stationIdentifier
        ? `Nearest Station: ${stationInfo.stationIdentifier}`
        : "";
    }
    function stopPlayback() {
      if (playbackTimer) {
        clearInterval(playbackTimer);
        playbackTimer = null;
      }
      playPauseBtn.textContent = "Animate";
      document.querySelectorAll(".controls button").forEach(btn => btn.classList.remove("active"));
    }
    function startPlayback(dir, intervalMs) {
      lastPlaybackMode = { dir, intervalMs };
      stopPlayback();
      if (!timeline.length) return;
      const activeBtn = dir < 0
        ? (intervalMs < 1000 ? backFastBtn : backBtn)
        : (intervalMs < 1000 ? forwardFastBtn : forwardBtn);
      activeBtn.classList.add("active");
      playPauseBtn.textContent = "Pause";
      playbackTimer = setInterval(() => {
        const next = Number(slider.value) + dir;
        if (next < Number(slider.min) || next > Number(slider.max)) {
          stopPlayback();
          return;
        }
        renderByIndex(next);
      }, intervalMs);
    }
    function initPlayback() {
      playPauseBtn.addEventListener("click", () => {
        if (playbackTimer) stopPlayback();
        else startPlayback(lastPlaybackMode.dir, lastPlaybackMode.intervalMs);
      });
      backBtn.addEventListener("click", () => startPlayback(-1, 1000));
      backFastBtn.addEventListener("click", () => startPlayback(-1, 250));
      forwardBtn.addEventListener("click", () => startPlayback(1, 1000));
      forwardFastBtn.addEventListener("click", () => startPlayback(1, 250));
    }
    function initSearch() {
      addressInput.addEventListener("input", () => {
        pendingLocation = null;
        searchStatus.textContent = "";
        const q = addressInput.value.trim();
        if (searchTimer) clearTimeout(searchTimer);
        if (q.length < 3) {
          clearSuggestions();
          return;
        }
        searchTimer = setTimeout(() => searchAddresses(q), 300);
      });
      addressInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          const first = suggestions.querySelector(".suggestion");
          if (first) first.dispatchEvent(new MouseEvent("mousedown"));
        }
      });
      document.addEventListener("click", (e) => {
        if (!e.target.closest(".searchWrap")) clearSuggestions();
      });
      loadBtn.addEventListener("click", () => {
        if (!pendingLocation) {
          searchStatus.textContent = "Choose a result from the search list first.";
          return;
        }
        loadLocation(pendingLocation);
      });
    }
    function init() {
      initSearch();
      initPlayback();
      slider.addEventListener("input", e => {
        stopPlayback();
        renderByIndex(Number(e.target.value));
      });
      nowBtn.addEventListener("click", () => {
        stopPlayback();
        if (!timeline.length) return;
        const nowHour = floorHour(Date.now());
        let bestIndex = 0;
        let bestDelta = Infinity;
        for (let i = 0; i < timeline.length; i++) {
          const delta = Math.abs(timeline[i].time - nowHour);
          if (delta < bestDelta) {
            bestDelta = delta;
            bestIndex = i;
          }
        }
        renderByIndex(bestIndex);
      });
      stationCanvas.addEventListener("click", e => {
        const rect = stationCanvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (stationCanvas.width / rect.width);
        const y = (e.clientY - rect.top) * (stationCanvas.height / rect.height);
        const hit = regionHit(x, y);
        if (hit) togglePlotVariable(hit);
      });
      const saved = getSavedLocation() || DEFAULT_LOCATION;
      addressInput.value = saved.name;
      pendingLocation = saved;
      setLocationTitle(saved.name);
      setForecastSource(saved);
      rebuildChart();
      loadLocation(saved);
    }
    window.addEventListener("load", init);
  </script>
</body>
