<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>NWS forecast station model</title>
<script id="search-js" defer src="https://api.mapbox.com/search-js/v1.5.0/web.js"></script>
<style>
  body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-items:center;
    background:#fff;
    font-family:Arial,sans-serif;
  }
  .wrap{
    width:420px;
    text-align:center;
  }
  .searchRow{
    display:grid;
    grid-template-columns:1fr auto;
    gap:8px;
    margin-bottom:8px;
    align-items:center;
  }
  mapbox-search-box{
    display:block;
    width:100%;
    min-height:40px;
  }
  .searchRow button{
    padding:8px 12px;
    font:14px Arial,sans-serif;
    cursor:pointer;
  }
  #searchStatus{
    min-height:18px;
    font-size:12px;
    margin-bottom:6px;
  }
  #locationName{
    font:18px Arial,sans-serif;
    margin-bottom:8px;
  }
  #loading{
    font:16px Arial,sans-serif;
    margin-bottom:8px;
  }
  #station{
    width:320px;
    height:260px;
    display:block;
    margin:0 auto;
  }
  #station text{
    font:24px Arial,sans-serif;
    fill:#000;
  }
  #station .small{
    font-size:18px;
  }
  input[type="range"]{
    width:100%;
    margin-top:8px;
  }
  .labels{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin-top:6px;
    font-size:12px;
  }
  .labels span:nth-child(1){text-align:left}
  .labels span:nth-child(2){text-align:center}
  .labels span:nth-child(3){text-align:right}
</style>
</head>
<body>

<div class="wrap">
  <div class="searchRow">
    <mapbox-search-box id="mbSearch"></mapbox-search-box>
    <button id="loadBtn" type="button">Load Location</button>
  </div>

  <div id="searchStatus"></div>
  <div id="locationName"></div>
  <div id="loading">Loading</div>

  <svg id="station" viewBox="0 0 320 260" aria-label="Forecast station model"></svg>

  <input id="timeSlider" type="range">

  <div class="labels">
    <span id="startLabel"></span>
    <span id="selectedLabel"></span>
    <span id="endLabel"></span>
  </div>
</div>

<script>
let hourlyForecast = null;
let gridForecast = null;
let pendingLocation = null;

const MAPBOX_TOKEN = "YOUR_MAPBOX_ACCESS_TOKEN";
const STORAGE_KEY = "nwsStationModelLocation";

const DEFAULT_LOCATION = {
  name: "South Lewis Central School High School, Turin, NY",
  lat: 43.6359,
  lon: -75.3937
};

const $ = id => document.getElementById(id);

const station = $("station");
const slider = $("timeSlider");
const startLabel = $("startLabel");
const selectedLabel = $("selectedLabel");
const endLabel = $("endLabel");
const loading = $("loading");
const locationName = $("locationName");
const searchStatus = $("searchStatus");
const loadBtn = $("loadBtn");
const mbSearch = $("mbSearch");

const dirMap = {
  N:0, NNE:22.5, NE:45, ENE:67.5, E:90, ESE:112.5, SE:135, SSE:157.5,
  S:180, SSW:202.5, SW:225, WSW:247.5, W:270, WNW:292.5, NW:315, NNW:337.5
};

function fmt(t){
  return new Date(+t).toLocaleString([], {month:"short", day:"numeric", hour:"numeric"});
}
function cToF(c){
  return c == null ? null : Math.round(c * 9 / 5 + 32);
}
function parseDurationMs(d){
  const m = String(d || "").match(/^P(?:(\d+)D)?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?)?$/);
  if (!m) return 0;
  return ((+m[1]||0)*86400000) + ((+m[2]||0)*3600000) + ((+m[3]||0)*60000) + ((+m[4]||0)*1000);
}
function parseValidTime(vt){
  const [start, dur="PT0H"] = String(vt || "").split("/");
  const s = Date.parse(start);
  const d = parseDurationMs(dur) || 3600000;
  return {start:s, end:s+d, durationMs:d};
}
function props(){
  return gridForecast?.properties || {};
}
function layer(...names){
  const p = props();
  for (const n of names) if (p[n]?.values?.length) return p[n];
  return null;
}
function layerRegex(re, excludeRe){
  const p = props();
  for (const k of Object.keys(p)){
    if (excludeRe && excludeRe.test(k)) continue;
    if (re.test(k) && p[k]?.values?.length) return p[k];
  }
  return null;
}
function pressureLayer(){
  return (
    layer("seaLevelPressure", "pressure", "barometricPressure", "pressureReducedToMeanSeaLevel") ||
    layerRegex(/pressure/i, /probability|tropical|hurricane|wind/i)
  );
}
function qpfLayer(){
  return (
    layer("quantitativePrecipitation") ||
    layerRegex(/quantitativePrecipitation|precip/i, /probability|snow|ice/i)
  );
}
function gridValue(layerObj, t){
  const vals = layerObj?.values;
  if (!vals?.length) return null;
  let nearest = null, bestDiff = Infinity;
  for (const v of vals){
    if (v.value == null) continue;
    const {start, end} = parseValidTime(v.validTime);
    if (t >= start && t < end) return v.value;
    const diff = Math.abs(start - t);
    if (diff < bestDiff){
      bestDiff = diff;
      nearest = v.value;
    }
  }
  return nearest;
}
function gridIntervals(layerObj){
  return (layerObj?.values || []).filter(v => v.value != null).map(v => {
    const {start, end, durationMs} = parseValidTime(v.validTime);
    return {start, end, durationMs, value:v.value};
  });
}
function integrateLayer(layerObj, t0, t1){
  let total = 0;
  for (const it of gridIntervals(layerObj)){
    const overlap = Math.max(0, Math.min(t1, it.end) - Math.max(t0, it.start));
    if (!overlap || !it.durationMs) continue;
    total += it.value * (overlap / it.durationMs);
  }
  return total;
}
function nearestPeriod(t){
  const periods = hourlyForecast.properties.periods;
  let best = periods[0], bestDiff = Infinity;
  for (const p of periods){
    const diff = Math.abs(Date.parse(p.startTime) - t);
    if (diff < bestDiff){
      bestDiff = diff;
      best = p;
    }
  }
  return best;
}
function dewpointFromTRH(tempF, rh){
  if (tempF == null || rh == null) return null;
  const t = (tempF - 32) * 5 / 9;
  const a = 17.625, b = 243.04;
  const g = Math.log(rh / 100) + (a * t) / (b + t);
  return Math.round((((b * g) / (a - g)) * 9 / 5) + 32);
}
function pressureHpa(v, u){
  u = String(u || "");
  if (u.includes(":Pa") || /\bPa\b/.test(u)) return v / 100;
  if (u.includes("kPa")) return v * 10;
  if (u.includes("hPa") || u.includes("mb")) return v;
  if (v > 2000) return v / 100;
  return v;
}
function pressureCode(v, u){
  if (v == null) return "///";
  const hPa = pressureHpa(v, u);
  return String(Math.round(hPa * 10)).slice(-3).padStart(3, "0");
}
function pressureTrend(t){
  const pl = pressureLayer();
  if (!pl) return {num:"", svg:""};
  const now = gridValue(pl, t);
  const prev = gridValue(pl, t - 3 * 3600000);
  if (now == null || prev == null) return {num:"", svg:""};
  const delta = pressureHpa(now, pl.uom) - pressureHpa(prev, pl.uom);
  const num = String(Math.round(Math.abs(delta) * 10));
  let svg = '<line x1="205" y1="140" x2="228" y2="140" stroke="#000" stroke-width="3"/>';
  if (delta > 0.05) svg = '<polyline points="205,146 216,134 228,134" fill="none" stroke="#000" stroke-width="3"/>';
  else if (delta < -0.05) svg = '<polyline points="205,134 216,146 228,146" fill="none" stroke="#000" stroke-width="3"/>';
  return {num, svg};
}
function precipInches3h(t){
  const qpf = qpfLayer();
  if (!qpf) return "";
  const amt = integrateLayer(qpf, t - 3 * 3600000, t);
  const u = String(qpf.uom || "");
  let inches = amt;
  if (u.includes(":mm") || /\bmm\b/.test(u)) inches = amt / 25.4;
  else if (u.includes(":m") || /\bm\b/.test(u)) inches = amt * 39.3701;
  else if (u.includes("inch")) inches = amt;
  if (!isFinite(inches) || inches <= 0.001) return "0.00";
  return inches.toFixed(2);
}
function weatherCode(text){
  text = String(text || "").toUpperCase();
  if (text.includes("THUNDER")) return "TS";
  if (text.includes("FREEZING RAIN")) return "FZRA";
  if (text.includes("SLEET") || text.includes("ICE PELLETS")) return "PL";
  if (text.includes("SNOW") || text.includes("FLURRIES")) return "SN";
  if (text.includes("RAIN") || text.includes("SHOWERS") || text.includes("DRIZZLE")) return "RA";
  if (text.includes("FOG") || text.includes("MIST")) return "FG";
  return "";
}
function skyCoverPct(period, t){
  const v = gridValue(layer("skyCover"), t);
  if (v != null) return v;
  const text = String(period.shortForecast || "").toUpperCase();
  if (text.includes("OVERCAST")) return 100;
  if (text.includes("MOSTLY CLOUDY")) return 75;
  if (text.includes("PARTLY CLOUDY")) return 50;
  if (text.includes("MOSTLY SUNNY")) return 25;
  if (text.includes("SUNNY") || text.includes("CLEAR")) return 0;
  if (text.includes("CLOUDY")) return 100;
  return 0;
}
function skySvg(p){
  const open = '<circle cx="160" cy="130" r="18" fill="#fff" stroke="#000" stroke-width="3"/>';
  if (p >= 87) return '<circle cx="160" cy="130" r="18" fill="#000" stroke="#000" stroke-width="3"/>';
  if (p >= 62) return '<circle cx="160" cy="130" r="18" fill="#000"/><path d="M160 130 L160 112 A18 18 0 0 1 178 130 Z" fill="#fff"/><circle cx="160" cy="130" r="18" fill="none" stroke="#000" stroke-width="3"/>';
  if (p >= 37) return '<path d="M160 112 A18 18 0 0 1 160 148 L160 130 Z" fill="#000"/><circle cx="160" cy="130" r="18" fill="none" stroke="#000" stroke-width="3"/>';
  if (p >= 12) return open + '<path d="M160 130 L160 112 A18 18 0 0 1 178 130 Z" fill="#000"/>';
  return open;
}
function gridWindKt(t){
  const w = layer("windSpeed");
  const v = gridValue(w, t);
  if (v == null) return null;
  const u = String(w?.uom || "");
  if (u.includes("km_h-1")) return Math.round(v * 0.539957);
  if (u.includes("m_s-1"))  return Math.round(v * 1.94384);
  if (u.includes("mi_h-1")) return Math.round(v * 0.868976);
  if (u.includes("kt"))     return Math.round(v);
  return Math.round(v);
}
function gridWindDeg(t){
  const v = gridValue(layer("windDirection"), t);
  if (v == null || isNaN(v)) return null;
  return ((+v % 360) + 360) % 360;
}
function degFromCardinal(s){
  return dirMap[String(s || "").toUpperCase()] ?? null;
}
function parseSpeedKt(s){
  const nums = String(s || "").match(/\d+(\.\d+)?/g)?.map(Number) || [];
  if (!nums.length) return 0;
  return Math.round((nums.reduce((a,b)=>a+b,0) / nums.length) * 0.868976);
}
function windSvg(dir, kt){
  if (kt == null || kt < 3) return '<circle cx="160" cy="130" r="2" fill="#000"/>';

  let rem = Math.round(kt / 5) * 5;

  const x = 160;
  const yCenter = 130;
  const yTip = 70;

  let cursor = yTip;
  let placedAnything = false;

  let s = `<g transform="rotate(${dir} 160 130)" stroke="#000" stroke-width="3" fill="#000" stroke-linecap="round" stroke-linejoin="round">
    <line x1="${x}" y1="${yCenter}" x2="${x}" y2="${yTip}"/>`;

  // 50-knot pennants start at the tip
  while (rem >= 50){
    s += `<polygon points="${x},${cursor} ${x+22},${cursor} ${x},${cursor+12}"/>`;
    cursor += 14;
    rem -= 50;
    placedAnything = true;
  }

  // 10-knot barbs start at the tip unless a pennant already used it
  while (rem >= 10){
    s += `<line x1="${x}" y1="${cursor}" x2="${x+20}" y2="${cursor-8}"/>`;
    cursor += 10;
    rem -= 10;
    placedAnything = true;
  }

  // A lone 5-knot barb should be inset.
  // Otherwise it follows the last placed symbol.
  if (rem >= 5){
    const y = placedAnything ? cursor : yTip + 10;
    s += `<line x1="${x}" y1="${y}" x2="${x+12}" y2="${y-5}"/>`;
  }

  return s + `</g>`;
}
  
function render(t){
  const p = nearestPeriod(t);
  const temp = p.temperature ?? cToF(gridValue(layer("temperature"), t));
  const rh = p.relativeHumidity?.value ?? gridValue(layer("relativeHumidity"), t);
  const dpC = p.dewpoint?.value ?? gridValue(layer("dewpoint"), t);
  const dpt = dpC != null ? cToF(dpC) : dewpointFromTRH(temp, rh);
  const windKt = gridWindKt(t) ?? parseSpeedKt(p.windSpeed);
  const windDir = gridWindDeg(t) ?? degFromCardinal(p.windDirection) ?? 0;
  const pl = pressureLayer();
  const pressure = pressureCode(gridValue(pl, t), pl?.uom);
  const trend = pressureTrend(t);
  const wx = weatherCode(p.shortForecast);
  const visM = gridValue(layer("visibility"), t);
  const vis = visM == null ? "" : (visM / 1609.344).toFixed(1).replace(/\.0$/,"");
  const pcp3 = precipInches3h(t);
  const sky = skyCoverPct(p, t);

  selectedLabel.textContent = fmt(Date.parse(p.startTime));
  station.innerHTML = `
    <text x="70" y="95">${temp ?? ""}</text>
    <text x="70" y="215">${dpt ?? ""}</text>
    <text x="30" y="145">${vis}</text>
    <text x="104" y="145">${wx}</text>
    <text x="210" y="95">${pressure}</text>
    ${trend.svg}
    <text x="234" y="145" class="small">${trend.num}</text>
    <text x="220" y="215" class="small">${pcp3}</text>
    ${skySvg(sky)}
    ${windSvg(windDir, windKt)}
  `;
  loading.style.display = "none";
}
function setLocationTitle(name){
  locationName.textContent = name || "";
}
function setLoading(msg){
  loading.textContent = msg || "Loading";
  loading.style.display = "block";
}
function saveLocation(loc){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(loc)); }catch(e){}
}
function getSavedLocation(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)); }catch(e){ return null; }
}
function featureToLocation(detail){
  const f = detail?.features?.[0] || detail?.feature || detail;
  const coords = f?.geometry?.coordinates || f?.center;
  if (!coords || coords.length < 2) return null;
  const name =
    f?.properties?.full_address ||
    f?.properties?.place_formatted ||
    f?.place_name ||
    f?.properties?.name ||
    "Selected location";
  return { name, lon:+coords[0], lat:+coords[1] };
}
async function loadLocation(loc){
  setLoading("Loading");
  setLocationTitle(loc.name);
  searchStatus.textContent = "";
  slider.disabled = true;

  try{
    const point = await fetch(`https://api.weather.gov/points/${loc.lat},${loc.lon}`, {
      headers:{Accept:"application/geo+json"}
    }).then(r => r.json());

    const [h, g] = await Promise.all([
      fetch(point.properties.forecastHourly, {headers:{Accept:"application/geo+json"}}).then(r => r.json()),
      fetch(point.properties.forecastGridData, {headers:{Accept:"application/geo+json"}}).then(r => r.json())
    ]);

    hourlyForecast = h;
    gridForecast = g;

    const periods = hourlyForecast.properties.periods;
    const first = Date.parse(periods[0].startTime);
    const last  = Date.parse(periods[periods.length - 1].startTime);

    slider.min = first;
    slider.max = last;
    slider.step = 3600000;
    slider.value = first;
    slider.disabled = false;

    startLabel.textContent = fmt(first);
    endLabel.textContent = fmt(last);

    render(first);
    saveLocation(loc);
  }catch(e){
    station.innerHTML = "";
    startLabel.textContent = "";
    selectedLabel.textContent = "";
    endLabel.textContent = "";
    setLoading("Load failed");
    searchStatus.textContent = "Could not load that location.";
  }
}
function initMapbox(){
  if (!window.customElements.get("mapbox-search-box")) return;

  mbSearch.accessToken = MAPBOX_TOKEN;
  mbSearch.options = {
    country: "US",
    language: "en"
  };

  mbSearch.addEventListener("retrieve", (e) => {
    const loc = featureToLocation(e.detail);
    if (!loc){
      pendingLocation = null;
      searchStatus.textContent = "Selection did not include coordinates.";
      return;
    }
    pendingLocation = loc;
    searchStatus.textContent = `Selected: ${loc.name}`;
  });

  loadBtn.addEventListener("click", () => {
    if (!pendingLocation){
      searchStatus.textContent = "Choose a result from the autocomplete list first.";
      return;
    }
    loadLocation(pendingLocation);
  });
}
function init(){
  initMapbox();
  const saved = getSavedLocation() || DEFAULT_LOCATION;
  setLocationTitle(saved.name);
  loadLocation(saved);
}
slider.addEventListener("input", e => {
  if (hourlyForecast) render(+e.target.value);
});
window.addEventListener("load", init);
</script>

</body>
</html>
